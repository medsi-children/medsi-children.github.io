<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0fc7ce">
  <title>Медси Бот</title>
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico?">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <style>
    html{
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }
    html,body{
      margin:0;
      padding:0;
      height:100%;
      background:
        radial-gradient(circle at top left, rgba(15,199,206,0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(15,199,206,0.08), transparent 28%),
        #f7fbfc;
      overflow:hidden;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    }

    /* ===== LOADER ===== */
    #loader{
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top left, rgba(15,199,206,0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(15,199,206,0.08), transparent 28%),
        #f7fbfc;
      color:#11424a;
      z-index:10;
      transition:opacity .4s ease;
    }

    #loader.hidden{
      opacity:0;
      pointer-events:none;
    }

    .loader-title{
      font-size:18px;
      font-weight:700;
      margin:0 0 10px;
    }

    .loader-text{
      font-size:15px;
      color:#5f7f86;
      margin:0 0 22px;
      min-height:20px;
      text-align:center;
      padding:0 20px;
    }

    .dots{
      display:flex;
      gap:8px;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:rgba(15,199,206,0.28);
      animation:bounce 1s infinite ease-in-out;
    }
    .dot:nth-child(1){ background:#7ee7eb; }
    .dot:nth-child(2){ background:#0fc7ce; }
    .dot:nth-child(3){ background:#0daab1; }

    .medsi-loader{
    display:flex;
    align-items:flex-end;
    gap:12px;
  }
  
    .medsi-dot{
      border-radius:50%;
      background:#0fc7ce;
      animation:medsiPulse 1.2s infinite ease-in-out;
      box-shadow:0 6px 16px rgba(15,199,206,0.18);
    }
    
    .medsi-dot-1{
      width:28px;
      height:28px;
      animation-delay:0s;
    }
    
    .medsi-dot-2{
      width:20px;
      height:20px;
      animation-delay:.12s;
    }
    
    .medsi-dot-3{
      width:36px;
      height:36px;
      animation-delay:.24s;
    }
    
    .medsi-dot-4{
      width:24px;
      height:24px;
      animation-delay:.36s;
    }
    
    .medsi-dot-5{
      width:16px;
      height:16px;
      animation-delay:.48s;
    }
  
    @keyframes medsiPulse{
      0%,100%{
        transform:translateY(0) scale(1);
        opacity:.72;
      }
      50%{
        transform:translateY(-8px) scale(1.08);
        opacity:1;
      }
    }
  
    @keyframes bounce{
       0%,80%,100%{ transform:translateY(0); opacity:.3; }
       40%{ transform:translateY(-8px); opacity:1; }
    }

    /* ===== IFRAME ===== */
    iframe{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      border:0;
      background:#f7fbfc;
    }

    @supports(height:100dvh){
      iframe{ height:100dvh; }
    }
  </style>
</head>

<body>

  <!-- LOADING SCREEN -->
  <div id="loader">
    <h1 class="loader-title">Медси Бот</h1>
    <p class="loader-text" id="loaderText">Подключаемся…</p>

    <div class="medsi-loader">
      <div class="medsi-dot medsi-dot-1"></div>
      <div class="medsi-dot medsi-dot-2"></div>
      <div class="medsi-dot medsi-dot-3"></div>
      <div class="medsi-dot medsi-dot-4"></div>
      <div class="medsi-dot medsi-dot-5"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbzRKRjjI7NoHx8rD5ifEdrcexGuYlMEB453sOC2UTZDeBaybZiNPIY0vDTMkmeHhebVpA/exec"
    allow="clipboard-read; clipboard-write; fullscreen"
    referrerpolicy="no-referrer"
  ></iframe>

  <script>
    const loader     = document.getElementById("loader");
    const loaderText = document.getElementById("loaderText");
    const frame      = document.getElementById("appFrame");

    // сменяющиеся фразы
    const phrases = [
      "Подключаемся…",
      "Загружаем интерфейс…",
      "Почти готово…",
      "Ещё секундочку…"
    ];

    let i = 0;
    const interval = setInterval(() => {
      i = (i + 1) % phrases.length;
      loaderText.textContent = phrases[i];
    }, 1400);

    // когда iframe загрузился → скрываем loader
    frame.addEventListener("load", () => {
      clearInterval(interval);
      loader.classList.add("hidden");

      setTimeout(() => {
        loader.style.display = "none";
      }, 450);
    });
  </script>

</body>
</html>
